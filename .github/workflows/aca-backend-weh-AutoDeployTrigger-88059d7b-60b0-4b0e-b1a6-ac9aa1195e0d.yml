name: Trigger auto deployment for aca-backend-weh

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches:
      [ main ]
    paths:
    - 'src/back/**'
    - '.github/workflows/aca-backend-weh-AutoDeployTrigger-88059d7b-60b0-4b0e-b1a6-ac9aa1195e0d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo
    env:
      ACR_NAME: ${{ secrets.ACABACKENDWEH_ACR_NAME }}
      REGISTRY_LOGIN_SERVER: ${{ secrets.ACABACKENDWEH_ACR_NAME }}.azurecr.io
      CONTAINER_APP_NAME: aca-backend-weh
      RESOURCE_GROUP: rg-wedding-edwige-henri
      IMAGE_NAME: aca-backend-weh
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ACABACKENDWEH_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ACABACKENDWEH_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ACABACKENDWEH_AZURE_SUBSCRIPTION_ID }}

      - name: Validate deployment settings
        shell: bash
        run: |
          if [ -z "${ACR_NAME}" ]; then
            echo "ACABACKENDWEH_ACR_NAME GitHub secret is missing or empty."
            exit 1
          fi

          if [ -z "${{ secrets.ACABACKENDWEH_ACR_ADMIN_USERNAME }}" ]; then
            echo "ACABACKENDWEH_ACR_ADMIN_USERNAME GitHub secret is missing or empty."
            exit 1
          fi

          if [ -z "${{ secrets.ACABACKENDWEH_ACR_ADMIN_PASSWORD }}" ]; then
            echo "ACABACKENDWEH_ACR_ADMIN_PASSWORD GitHub secret is missing or empty."
            exit 1
          fi

      - name: Install Container Apps extension
        shell: bash
        run: az extension add --name containerapp --upgrade --allow-preview true

      - name: Log in to ACR with admin account
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.ACABACKENDWEH_ACR_ADMIN_USERNAME }}
          password: ${{ secrets.ACABACKENDWEH_ACR_ADMIN_PASSWORD }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: ./src/back
          file: ./src/back/Dockerfile
          push: true
          tags: ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Update Container App image
        shell: bash
        run: |
          az containerapp update \
            --name "${CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --image "${REGISTRY_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"

