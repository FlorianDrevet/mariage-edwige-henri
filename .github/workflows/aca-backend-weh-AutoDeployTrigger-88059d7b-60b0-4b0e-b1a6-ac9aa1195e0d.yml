name: Trigger auto deployment for aca-backend-weh

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/aca-backend-weh-AutoDeployTrigger-88059d7b-60b0-4b0e-b1a6-ac9aa1195e0d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ACABACKENDWEH_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ACABACKENDWEH_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ACABACKENDWEH_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.ACABACKENDWEH_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ACABACKENDWEH_REGISTRY_PASSWORD }}
          containerAppName: aca-backend-weh
          resourceGroup: rg-wedding-edwige-henri
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


