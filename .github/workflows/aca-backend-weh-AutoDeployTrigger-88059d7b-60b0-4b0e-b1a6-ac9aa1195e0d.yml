name: Trigger auto deployment for aca-backend-weh

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches:
      [ main ]
    paths:
    - 'src/back/**'
    - '.github/workflows/aca-backend-weh-AutoDeployTrigger-88059d7b-60b0-4b0e-b1a6-ac9aa1195e0d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo
    env:
      ACR_NAME: ${{ secrets.ACABACKENDWEH_ACR_NAME }}
      REGISTRY_LOGIN_SERVER: ${{ secrets.ACABACKENDWEH_ACR_NAME }}.azurecr.io
      IMAGE_NAME: aca-backend-weh
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ACABACKENDWEH_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ACABACKENDWEH_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ACABACKENDWEH_AZURE_SUBSCRIPTION_ID }}

      - name: Validate deployment settings
        shell: bash
        run: |
          if [ -z "${ACR_NAME}" ]; then
            echo "ACABACKENDWEH_ACR_NAME GitHub secret is missing or empty."
            exit 1
          fi

      - name: Log in to ACR with Azure CLI
        shell: bash
        run: az acr login --name "${ACR_NAME}"

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: ./src/back
          file: ./src/back/Dockerfile
          push: true
          tags: ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy existing image to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          imageToDeploy: ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          acrName: ${{ secrets.ACABACKENDWEH_ACR_NAME }}
          containerAppName: aca-backend-weh
          resourceGroup: rg-wedding-edwige-henri
          targetPort: 8080
          ingress: external
          environmentVariables: >-
            HTTP_PORTS=8080
            ASPNETCORE_FORWARDEDHEADERS_ENABLED=true

