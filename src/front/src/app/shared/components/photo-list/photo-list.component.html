<div class="photo-list" >
  @if (isLoading && photos.length === 0) {
    <app-skeleton-photo-card [count]="6"></app-skeleton-photo-card>
  }
  <div *ngFor="let photo of photos; trackBy: trackById" class="photo-item">
    <img [src]="photo.urlImage" alt="Photo" loading="lazy" class="image-from-wedding">
    <div class="action-buttons-img">
      <button class="button-download" (click)="downloadPicture(photo)">
        <img src="assets/icons/telecharger.png">
      </button>
      @if ((AuthService.isAdmin$ | async) || AuthService.Name === photo.username) {
        <button class="button-delete" (click)="deletePicture(photo)">
          <img src="assets/icons/poubelle-de-recyclage.png">
        </button>
      }
    </div>
  </div>
  @if (isLoading && photos.length > 0) {
    <app-skeleton-photo-card [count]="3"></app-skeleton-photo-card>
  }
</div>
