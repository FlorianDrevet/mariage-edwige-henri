<form [formGroup]="loginForm" class="flex flex-row w-screen h-screen">
  @if(!(screenService.isSmallScreen$ | async)) {
    <div class="container-2 w-2/3"></div>
  }
  <div class="w-4/5 lg:w-1/3 flex flex-col items-center mt-auto mb-auto ml-auto mr-auto">
    <img alt="Fleurs decoratives"
         priority
         height="278" ngSrc="assets/layout/middle_gold_flower.webp" width="1024">

    <h1 class="font-librebaskerville text-5xl">Connexion</h1>
    <p class="w-4/5 mt-20 font-librebaskerville text-justify mb-10">
      En vous connectant, vous pourrez accéder aux informations concernant
      la réception. Vous retrouverez les identifiants dans le faire part,
      sur le carton de la réception.
    </p>

    <app-input
      [icon]="icon.cilGroup"
      [form]="loginForm"
      [required]="true"
      controlName="username"
      class="mt-10"
      placeholder="Identifiant"
    ></app-input>

    <app-input
      [icon]="icon.cilLockLocked"
      [isPassword]="true"
      [form]="loginForm"
      [required]="true"
      controlName="password"
      class="mt-10"
      placeholder="Mot de passe"
    ></app-input>

    @if (error) {
      <p class="text-red-700 font-librebaskerville text-xl mt-10 w-4/5 text-center">{{error.toString()}}</p>
    }

    <app-button (click)="onLoginClick()" class="mt-10">Connexion</app-button>
  </div>
</form>
