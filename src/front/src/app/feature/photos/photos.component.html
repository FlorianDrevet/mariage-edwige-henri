<div class="flex flex-col w-full items-center mt-12 lg:mb-0">
  <app-title-wedding>Les photos</app-title-wedding>
  @if ((AuthService.isAuthenticated()))
  {
    @if(daysLeft <= 0 || (AuthService.isAdmin())|| (AuthService.isModerator())) {
      <app-button style="margin-bottom: 20px" (click)="fileInput.click()">Ajouter une photo</app-button>
      <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;">
        <ul class="flex flex-row justify-around space-x-8">
          <li>
            <button class="font-montserrat text-sm d-flex flex-column align-middle items-center" [ngClass]="{'active-link': selectedFilter === 'all'}" (click)="onFilterChange(PictureFilterEnum.ALL)">
              <img ngSrc="assets/icons/monde.png" height="28" width="28" alt="Icon Monde"/>
              <span class="text-xs">Prise par<br>tout le monde</span>
            </button>
          </li>
          <li>
            <button class="font-montserrat text-sm d-flex flex-column align-middle items-center" [ngClass]="{'active-link': selectedFilter === 'photograph'}" (click)="onFilterChange(PictureFilterEnum.PHOTOGRAPH)">
              <img ngSrc="assets/icons/photos-instantanees.png" height="28" width="28" alt="Icon Photograph"/>
              <p class="mt-1 text-xs">Photographe</p>
            </button>
          </li>
          <li>
            <button class="font-montserrat text-sm d-flex flex-column align-middle items-center" [ngClass]="{'active-link': selectedFilter === 'own'}" (click)="onFilterChange(PictureFilterEnum.OWN)">
              <img ngSrc="assets/icons/photo-de-famille.png" height="28" width="28" alt="Icon Monde"/>
              <p class="mt-1 text-xs">PhotoBooth</p>
            </button>
          </li>
        </ul>
        <app-photo-list></app-photo-list>
    }
    @else {
      <img class="mb-6 mt-6" ngSrc="assets/icons/appareil-photo.png" height="120" width="120" alt="Icon d'appareil photo"/>
      <p class="text-base text-center mt-6 font-montserrat">
        Vous aurez accès à cette fonctionnalité le jour du mariage !
      </p>
      <p class="text-base text-center w-4/5 lg:w-2/5 font-montserrat opacity-80">
        Soyez encore un peu patient.
      </p>
    }
  } @else {
    <app-need-to-be-connected></app-need-to-be-connected>
  }
</div>
