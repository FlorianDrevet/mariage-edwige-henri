@if(displayExplanations) {
  <app-explanation-profil-modal></app-explanation-profil-modal>
}

@if(screenService.isSmallScreen$ | async) {
  <!-- ── MOBILE ── -->
  <div class="flex flex-col w-full items-center mobile-accueil">
    <div class="flex-1"></div>
    <div class="w-3/4 px-6 pt-2 pb-0 z-50 relative">
      <div class="powder-snow" aria-hidden="true"></div>
      <img
        src="assets/pictures/edwige_henri.jpg"
        alt="Photo d'Edwige et Henri"
        class="w-full object-cover rounded-lg shadow-lg max-h-[calc(100dvh-28rem)] relative z-10" />
    </div>
    <img
      alt="image de fleurs gold"
      class="mx-auto rotate-180"
      height="80" ngSrc="assets/layout/gold_flowers_straight.webp" width="280">
    <div class="flex-1"></div>
  </div>
} @else {
  <!-- ── DESKTOP ── -->
  <div class="desktop-accueil flex items-center justify-center">
    <div class="relative z-50 px-4">
      <div class="powder-snow" aria-hidden="true"></div>
      <img
        src="assets/pictures/edwige_henri.jpg"
        alt="Photo d'Edwige et Henri"
        class="hero-photo rounded-lg shadow-lg relative z-10" />
    </div>
    <!-- Coin bas-droite -->
    <img
      priority
      ngSrc="assets/layout/gold_flowers.webp"
      class="fixed bottom-0 right-0 h-[360px] w-auto rotate-180 pointer-events-none z-0"
      alt="decoration doré"
      width="1024"
      height="469">
  </div>
}
