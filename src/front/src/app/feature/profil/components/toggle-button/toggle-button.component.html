<div class="radio-container mt-3 ml-auto mr-auto" [ngClass]="{'disabled': disabled()}">
  <input [disabled]="disabled()" [checked]="checkedYes()" class="hidden-input"
         [id]="'yes_' + _id" [name]="'group_' + _id"
         type="radio" value="yes" (click)="yesClicked()">
  <label class="custom-radio" [for]="'yes_' + _id">{{ yesLabel() }}</label>

  <input [disabled]="disabled()" [checked]="checkedNo()" class="hidden-input"
         [id]="'no_' + _id" [name]="'group_' + _id"
         type="radio" value="no" (click)="noClicked()">
  <label class="custom-radio" [for]="'no_' + _id">{{ noLabel() }}</label>
</div>
