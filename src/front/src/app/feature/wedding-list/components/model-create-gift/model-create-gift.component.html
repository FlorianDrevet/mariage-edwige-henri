<app-button [cModalToggle]="verticallyCenteredModal.id">Nouveau Cadeau</app-button>
<c-modal #verticallyCenteredModal alignment="center" id="verticallyCenteredModal" size="lg">
  <c-modal-header>
    <h5 cModalTitle class="font-montserrat text-4xl">Ajouter un nouveau cadeau</h5>
  </c-modal-header>
  <c-modal-body>
    <form [formGroup]="createGiftForm">
      <div class="h-10"></div>

      <app-input
        [form]="createGiftForm"
        [icon]="icon.cilGift"
        [required]="true"
        class="mt-10"
        controlName="name"
        placeholder="Nom"
      ></app-input>

      <div class="h-10"></div>

      <app-input
        [form]="createGiftForm"
        [icon]="icon.cilMoney"
        [required]="true"
        class="mt-24"
        controlName="price"
        placeholder="Prix"
      ></app-input>

      <select aria-label="Category" cSelect formControlName="category" class="mt-24" [required]="true">
        @for (cat of giftState.categories(); track cat.id) {
          <option [value]="cat.name">{{ cat.name }}</option>
        }
      </select>

      <div class="flex flex-row items-center gap-2 mt-4">
        <input
          type="text"
          [(ngModel)]="newCategoryName"
          [ngModelOptions]="{standalone: true}"
          placeholder="Nouvelle catégorie"
          class="px-3 py-2 rounded bg-primary-dark text-gold border border-gold-dark font-montserrat text-sm flex-1"
          (keyup.enter)="onAddCategory()"
        >
        <app-button (click)="onAddCategory()">+</app-button>
      </div>
      @if (giftState.categories().length > 0) {
        <div class="flex flex-row flex-wrap gap-2 mt-3">
          @for (cat of giftState.categories(); track cat.id) {
            <div class="flex items-center gap-1 px-3 py-1 rounded-full bg-primary-dark text-gold text-sm font-montserrat">
              <span>{{ cat.name }}</span>
              <button type="button" (click)="onDeleteCategory(cat.id)" class="ml-1 text-gold-light hover:text-gold cursor-pointer">&times;</button>
            </div>
          }
        </div>
      }

      <div class="h-10"></div>

      @if (image !== undefined) {
        <div class="preview-img-container">
          <img [src]="image" alt="Image du produit">
        </div>
      }
      <app-button (click)="fileInput.click()">Choisir une image</app-button>
      <input #fileInput (change)="onFileSelected()" formControlName="imageFile"
             hidden id="file" required type="file">
    </form>
  </c-modal-body>
  <c-modal-footer>
    <app-button [cModalToggle]="verticallyCenteredModal.id">Annuler</app-button>
    <app-button
      (click)="onCreateGiftClick()"
      [cModalToggle]="verticallyCenteredModal.id"
    >Ajouter
    </app-button>
  </c-modal-footer>
</c-modal>
