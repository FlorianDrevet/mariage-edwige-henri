<app-button [cModalToggle]="verticallyCenteredModal.id">Nouveau Cadeau</app-button>
<c-modal #verticallyCenteredModal alignment="center" id="verticallyCenteredModal" size="lg">
  <c-modal-header>
    <h5 cModalTitle class="font-montserrat text-2xl text-gold">Ajouter un cadeau</h5>
  </c-modal-header>
  <c-modal-body>
    <form [formGroup]="createGiftForm" class="flex flex-col gap-6">

      <!-- Image upload zone -->
      <div
        class="relative group cursor-pointer rounded-xl border-2 border-dashed border-gold-dark/40 hover:border-gold transition-all duration-300 overflow-hidden"
        [class.border-solid]="imagePreview"
        [class.border-gold]="imagePreview"
        (click)="fileInput.click()"
        (dragover)="onDragOver($event)"
        (drop)="onDrop($event)"
      >
        @if (imagePreview) {
          <div class="relative aspect-video bg-primary-dark">
            <img [src]="imagePreview" alt="Aperçu" class="w-full h-full object-contain">
            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
              <span class="text-gold font-montserrat text-sm">Cliquer pour changer</span>
            </div>
          </div>
        } @else {
          <div class="flex flex-col items-center justify-center py-12 px-4 text-center">
            <svg class="w-10 h-10 text-gold-dark mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <p class="text-gold-dark font-montserrat text-sm">Glisser une image ou <span class="text-gold underline">parcourir</span></p>
            <p class="text-gold-dark/50 font-montserrat text-xs mt-1">PNG, JPG, WebP</p>
          </div>
        }
        <input #fileInput (change)="onFileSelected()" formControlName="imageFile"
               hidden accept="image/*" type="file">
      </div>

      <!-- Name & Price row -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="flex flex-col gap-1.5">
          <label class="text-gold-dark font-montserrat text-xs uppercase tracking-wider">Nom du cadeau</label>
          <app-input
            [form]="createGiftForm"
            [icon]="icon.cilGift"
            [required]="true"
            controlName="name"
            placeholder="Ex: Service à vaisselle"
          ></app-input>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-gold-dark font-montserrat text-xs uppercase tracking-wider">Prix (€)</label>
          <app-input
            [form]="createGiftForm"
            [icon]="icon.cilMoney"
            [required]="true"
            controlName="price"
            placeholder="Ex: 150"
          ></app-input>
        </div>
      </div>

      <!-- Category select -->
      <div class="flex flex-col gap-1.5">
        <label class="text-gold-dark font-montserrat text-xs uppercase tracking-wider">Catégorie</label>
        <select
          aria-label="Category"
          cSelect
          formControlName="category"
          [required]="true"
          class="bg-primary-dark text-gold border border-gold-dark/40 rounded-lg px-3 py-2.5 font-montserrat text-sm focus:border-gold focus:outline-none transition-colors"
        >
          <option value="" disabled selected hidden>Choisir une catégorie</option>
          @for (cat of giftState.categories(); track cat.id) {
            <option [value]="cat.name">{{ cat.name }}</option>
          }
        </select>
      </div>

      <!-- Add new category -->
      <div class="flex flex-col gap-2">
        <div class="flex flex-row items-center gap-2">
          <input
            type="text"
            [(ngModel)]="newCategoryName"
            [ngModelOptions]="{standalone: true}"
            placeholder="Ajouter une catégorie..."
            class="flex-1 px-3 py-2 rounded-lg bg-primary-dark text-gold border border-gold-dark/40 font-montserrat text-sm placeholder:text-gold-dark/50 focus:border-gold focus:outline-none transition-colors"
            (keyup.enter)="onAddCategory()"
          >
          <button
            type="button"
            (click)="onAddCategory()"
            class="btn-grad px-3 py-2 font-montserrat"
          >+</button>
        </div>
        @if (giftState.categories().length > 0) {
          <div class="flex flex-row flex-wrap gap-2">
            @for (cat of giftState.categories(); track cat.id) {
              <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-primary-dark/80 text-gold-dark text-xs font-montserrat border border-gold-dark/20">
                {{ cat.name }}
                <button type="button" (click)="onDeleteCategory(cat.id)" class="ml-0.5 text-gold-dark/60 hover:text-gold transition-colors cursor-pointer">&times;</button>
              </span>
            }
          </div>
        }
      </div>

    </form>
  </c-modal-body>
  <c-modal-footer class="flex justify-end gap-3">
    <button
      type="button"
      [cModalToggle]="verticallyCenteredModal.id"
      class="px-5 py-2.5 rounded-lg border border-gold-dark/40 text-gold-dark font-montserrat text-sm hover:border-gold hover:text-gold transition-colors cursor-pointer bg-transparent"
    >Annuler</button>
    <button
      type="button"
      (click)="onCreateGiftClick()"
      [cModalToggle]="verticallyCenteredModal.id"
      [disabled]="createGiftForm.invalid"
      class="btn-grad px-5 font-montserrat"
    >Ajouter le cadeau</button>
  </c-modal-footer>
</c-modal>
