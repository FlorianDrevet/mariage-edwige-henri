<div class="">
  <div class="mx-auto max-w-2xl px-4 py-10 sm:px-6 sm:py-14 lg:max-w-6xl lg:px-8 flex flex-column">

    <app-title-wedding>Notre liste de mariage</app-title-wedding>

    @if (authService.isAdmin()) {
      <div class="mb-8 flex justify-end">
        <app-model-create-gift></app-model-create-gift>
      </div>
    }

    @if (giftState.isLoading()) {
      <app-loader text="Chargement de la liste" class="mt-12"></app-loader>
    }

    @for (cat of giftState.categories(); track cat.id; let i = $index) {
      @if (i === 0) {
        <app-category-gift
          [title]="cat.name"
          [categoryName]="cat.name"
          [products]="giftState.products()"
        ></app-category-gift>
      } @else {
        @defer (on viewport; hydrate on viewport) {
          <app-category-gift
            class="mt-12"
            [title]="cat.name"
            [categoryName]="cat.name"
            [products]="giftState.products()"
          ></app-category-gift>
        } @placeholder {
          <div class="mt-12 h-48"></div>
        }
      }
    }
  </div>
</div>
